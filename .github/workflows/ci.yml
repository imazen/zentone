name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: "--all-features"
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            features: "--all-features"
          - os: macos-latest
            target: aarch64-apple-darwin
            features: "--all-features"
          - os: macos-15-intel
            target: x86_64-apple-darwin
            features: "--all-features"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Test (default features)
        run: cargo test --target ${{ matrix.target }}

      - name: Test (all features)
        run: cargo test --target ${{ matrix.target }} ${{ matrix.features }}

      - name: Test (no default features)
        run: cargo test --target ${{ matrix.target }} --no-default-features

      - name: Test (no default + experimental)
        run: cargo test --target ${{ matrix.target }} --no-default-features --features experimental

  cross-i686:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --locked

      - name: Test i686 (default)
        run: cross test --target i686-unknown-linux-gnu

      - name: Test i686 (all features)
        run: cross test --target i686-unknown-linux-gnu --all-features

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

      - name: Clippy (no default features)
        run: cargo clippy --no-default-features -- -D warnings

      - name: Check docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  build-no-std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf

      - name: Check no_std build (no default features)
        run: cargo check --target thumbv7em-none-eabihf --no-default-features

      - name: Check no_std + experimental
        run: cargo check --target thumbv7em-none-eabihf --no-default-features --features experimental
